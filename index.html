                                                                    <tr key={inv.id} className="border-b border-gray-200">
                                                                        <td className="p-3 text-sm text-gray-700">{inv.date}</td>
                                                                        <td className="p-3 font-medium text-slate-800">{inv.id}</td>
                                                                        <td className="p-3 text-slate-800">{inv.receiverName}</td>
                                                                        <td className="p-3 text-right">AED {netAmt.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                                                                        <td className="p-3 text-right text-blue-600 font-medium">AED {vatAmt.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                                                                        <td className="p-3 text-right font-semibold">AED {inv.amount.toLocaleString(undefined, {minimumFractionDigits:2})}</td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </>
                                            )}

                                            <div className="mt-8 pt-8 border-t text-sm text-gray-500 text-center">
                                                Generated by Amer Bashir Transport LLC System.
                                            </div>
                                        </div>
                                    </div>
                                )}
                                </>
                            )}
                        </main>
                    </div>

                    {/* --- CATEGORY MANAGEMENT MODAL --- */}
                    {isCatModalOpen && (
                        <div className="fixed inset-0 z-[110] bg-black/60 flex justify-center items-center p-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md relative">
                                <button onClick={() => setIsCatModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
                                    <IconX size={24} />
                                </button>
                                <h3 className="text-xl font-bold mb-4 border-b pb-2">
                                    Manage {catModalType} Categories
                                </h3>

                                <form onSubmit={handleSaveCategory} className="flex gap-2 mb-6">
                                    <input 
                                        type="text" 
                                        required 
                                        value={newCatName} 
                                        onChange={e => setNewCatName(e.target.value)} 
                                        className="flex-1 border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500" 
                                        placeholder="Category Name..." 
                                    />
                                    <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-lg hover:bg-blue-700 font-medium whitespace-nowrap">
                                        {editingCat ? 'Update' : 'Add New'}
                                    </button>
                                    {editingCat && (
                                        <button type="button" onClick={() => {setEditingCat(null); setNewCatName('');}} className="px-3 py-2 bg-gray-100 rounded-lg text-gray-600 hover:bg-gray-200">
                                            Cancel
                                        </button>
                                    )}
                                </form>

                                <div className="max-h-60 overflow-y-auto border rounded-lg">
                                    <table className="w-full text-left">
                                        <tbody>
                                            {(catModalType === 'Income' ? incomeCategories : expenseCategories).map(cat => (
                                                <tr key={cat.id} className="border-b last:border-0 hover:bg-gray-50">
                                                    <td className="p-3 font-medium text-slate-700">{cat.name}</td>
                                                    <td className="p-3 text-right">
                                                        <div className="flex justify-end space-x-2">
                                                            <button onClick={() => editCategory(cat)} className="p-1.5 text-blue-500 hover:bg-blue-100 rounded transition" title="Edit">
                                                                <IconEdit size={16} />
                                                            </button>
                                                            <button onClick={() => deleteCategory(cat.id)} className="p-1.5 text-red-500 hover:bg-red-100 rounded transition" title="Delete">
                                                                <IconTrash2 size={16} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* --- DATABASE BACKUP/RESTORE MODAL --- */}
                    {isDbModalOpen && (
                        <div className="fixed inset-0 z-[110] bg-black/60 flex justify-center items-center p-4">
                            <div className="bg-white p-6 rounded-xl shadow-2xl w-full max-w-md relative">
                                <button onClick={() => setIsDbModalOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
                                    <IconX size={24} />
                                </button>
                                <h3 className="text-xl font-bold mb-4 border-b pb-2 flex items-center text-slate-800">
                                    <IconDatabase size={20} className="mr-2 text-blue-600" /> Database Management
                                </h3>
                                
                                <p className="text-sm text-gray-600 mb-6">Apne software ka data yahan se download (backup) karein ya purana data upload (restore) karein.</p>

                                <div className="space-y-4">
                                    <button onClick={handleBackup} className="w-full bg-blue-50 border border-blue-200 hover:bg-blue-600 hover:text-white text-blue-700 font-bold p-4 rounded-xl flex items-center justify-center transition-all group shadow-sm">
                                        <IconDownload size={20} className="mr-3 group-hover:-translate-y-1 transition-transform" /> 
                                        Data Backup Download Karein
                                    </button>

                                    <div className="relative">
                                        <input type="file" accept=".json" onChange={handleRestore} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" title="Upload Backup File" />
                                        <div className="w-full bg-green-50 border border-green-200 hover:bg-green-600 hover:text-white text-green-700 font-bold p-4 rounded-xl flex items-center justify-center transition-all group shadow-sm pointer-events-none">
                                            <IconUpload size={20} className="mr-3 group-hover:-translate-y-1 transition-transform" />
                                            Purana Backup Restore Karein
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="mt-4 text-xs text-red-500 font-medium text-center bg-red-50 p-2 rounded-lg">
                                    <span className="font-bold">Dhyan Dein:</span> Restore karne se current data overwrite ho jayega! Pehle naya backup zarur lein.
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
