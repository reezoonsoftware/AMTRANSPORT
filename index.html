        const IconX = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="M6 6l12 12"/></svg>;
        const IconPieChart = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>;
        const IconEdit = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>;
        const IconEye = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>;
        const IconSearch = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>;
        const IconSettings = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;
        const IconDatabase = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>;
        const IconDownload = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconUpload = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconMaximize = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>;
        const IconMinimize = ({size=24, className=""}) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/></svg>;

        // Custom Hook to Save Data to Browser Local Storage
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    console.error(error);
                    return initialValue;
                }
            });

            useEffect(() => {
                try {
                    window.localStorage.setItem(key, JSON.stringify(storedValue));
                } catch (error) {
                    console.error(error);
                }
            }, [key, storedValue]);

            return [storedValue, setStoredValue];
        }

        // Main App Component
        function App() {
            // --- AUTHENTICATION STATE ---
            const [isAuthenticated, setIsAuthenticated] = useState(false);
            const [loginUser, setLoginUser] = useState('');
            const [loginPass, setLoginPass] = useState('');
            const [loginError, setLoginError] = useState('');

            const handleLogin = (e) => {
                e.preventDefault();
                if (loginUser === 'admin' && loginPass === '123') {
                    setIsAuthenticated(true);
                    setLoginError('');
                } else {
                    setLoginError('Invalid username or password');
                }
            };

            const [activeTab, setActiveTab] = useState('dashboard');

            // --- LOCAL STORAGE DATABASE ---
            const [trucks, setTrucks] = useLocalStorage('amer_trucks', []);
            const [customers, setCustomers] = useLocalStorage('amer_customers', []);
            const [invoices, setInvoices] = useLocalStorage('amer_invoices', []);
            const [daybook, setDaybook] = useLocalStorage('amer_daybook', []);

            // Categories State
            const [incomeCategories, setIncomeCategories] = useLocalStorage('amer_inc_cat', [
                { id: 1, name: 'Freight Charges' }, { id: 2, name: 'Advance Payment' }, { id: 3, name: 'Other Income' }
            ]);
            const [expenseCategories, setExpenseCategories] = useLocalStorage('amer_exp_cat', [
                { id: 1, name: 'Diesel/Fuel' }, { id: 2, name: 'Toll Tax' }, { id: 3, name: 'Maintenance/Repair' }, 
                { id: 4, name: 'Driver Salary' }, { id: 5, name: 'Fines/Challans' }, { id: 6, name: 'Other Expense' }
            ]);

            // --- FORM STATES ---
            const [newCustomer, setNewCustomer] = useState({ name: '', phone: '', city: '' });
            const [newTruck, setNewTruck] = useState({ type: '', plate: '' });
            
            const [isInvoiceFormOpen, setIsInvoiceFormOpen] = useState(false);
            const [previewInvoice, setPreviewInvoice] = useState(null); // Preview State
            const [invoiceSearchQuery, setInvoiceSearchQuery] = useState(''); // Search State

            const [invoiceDraft, setInvoiceDraft] = useState({
                id: '', date: '', customerId: '', senderName: '', senderPhone: '', senderAddress: '',
                receiverName: '', receiverPhone: '', receiverAddress: '', truckId: '', amount: '', description: '', status: 'Pending'
            });
            const [newIncome, setNewIncome] = useState({ amount: '', description: '', categoryId: '' });
            const [newExpense, setNewExpense] = useState({ amount: '', description: '', categoryId: '' });

            // Category Management Modal States
            const [isCatModalOpen, setIsCatModalOpen] = useState(false);
            const [catModalType, setCatModalType] = useState('Income');
            const [newCatName, setNewCatName] = useState('');
            const [editingCat, setEditingCat] = useState(null);

            // Reports States
            const [reportTab, setReportTab] = useState('sale_invoice');
            const [reportCustomerId, setReportCustomerId] = useState('');
            const [reportDateFilter, setReportDateFilter] = useState('this_month');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            const [reportPreview, setReportPreview] = useState(null); // Report Preview State

            // Customer Ledger State
            const [viewingCustomerLedger, setViewingCustomerLedger] = useState(null);

            // --- NAYA STATE TIME AUR DATABASE MODAL KE LIYE ---
            const [currentTime, setCurrentTime] = useState(new Date());
            const [isDbModalOpen, setIsDbModalOpen] = useState(false);
            const [isFullScreen, setIsFullScreen] = useState(false); // Fullscreen State

            useEffect(() => {
                const timer = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);

            // Fullscreen Sync Effect (Agar koi ESC dabaye toh state update ho jaye)
            useEffect(() => {
                const handleFullScreenChange = () => {
                    setIsFullScreen(!!document.fullscreenElement);
                };
                document.addEventListener('fullscreenchange', handleFullScreenChange);
                return () => document.removeEventListener('fullscreenchange', handleFullScreenChange);
            }, []);

            // Backup Data Logic
            const handleBackup = () => {
                const data = {
                    amer_trucks: localStorage.getItem('amer_trucks'),
                    amer_customers: localStorage.getItem('amer_customers'),
                    amer_invoices: localStorage.getItem('amer_invoices'),
                    amer_daybook: localStorage.getItem('amer_daybook'),
                    amer_inc_cat: localStorage.getItem('amer_inc_cat'),
                    amer_exp_cat: localStorage.getItem('amer_exp_cat'),
                };
                const blob = new Blob([JSON.stringify(data)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");
                a.href = url;
                a.download = `AmerBashir_Backup_${new Date().toISOString().split('T')[0]}.json`;
                a.click();
            };

            // Restore Data Logic
            const handleRestore = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const data = JSON.parse(event.target.result);
                        if(data.amer_trucks) localStorage.setItem('amer_trucks', data.amer_trucks);
                        if(data.amer_customers) localStorage.setItem('amer_customers', data.amer_customers);
                        if(data.amer_invoices) localStorage.setItem('amer_invoices', data.amer_invoices);
                        if(data.amer_daybook) localStorage.setItem('amer_daybook', data.amer_daybook);
                        if(data.amer_inc_cat) localStorage.setItem('amer_inc_cat', data.amer_inc_cat);
                        if(data.amer_exp_cat) localStorage.setItem('amer_exp_cat', data.amer_exp_cat);
                        alert("Data successfully restore ho gaya hai! Software ab reload hoga.");
                        window.location.reload();
                    } catch (error) {
                        alert("Galat backup file!");
                    }
                };
                reader.readAsText(file);
            };

            // Fullscreen Toggle Logic
            const toggleFullScreen = () => {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch((err) => {
                        console.error(`Error attempting to enable full-screen mode: ${err.message}`);
                    });
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            };

            // --- FUNCTIONS ---
            
            // Manage Categories
            const openCategoryManage = (type) => {
                setCatModalType(type);
                setNewCatName('');
                setEditingCat(null);
                setIsCatModalOpen(true);
            };

            const handleSaveCategory = (e) => {
                e.preventDefault();
                if(!newCatName.trim()) return;
                
                const isInc = catModalType === 'Income';
                const categories = isInc ? incomeCategories : expenseCategories;
                const setCategories = isInc ? setIncomeCategories : setExpenseCategories;

                if (editingCat) {
                    setCategories(categories.map(c => c.id === editingCat.id ? { ...c, name: newCatName } : c));
                    setEditingCat(null);
                } else {
                    const newId = categories.length > 0 ? Math.max(...categories.map(c => c.id)) + 1 : 1;
                    setCategories([...categories, { id: newId, name: newCatName }]);
                }
                setNewCatName('');
            };

            const deleteCategory = (id) => {
                if(!window.confirm("Are you sure you want to delete this category?")) return;
                const isInc = catModalType === 'Income';
                if (isInc) setIncomeCategories(incomeCategories.filter(c => c.id !== id));
                else setExpenseCategories(expenseCategories.filter(c => c.id !== id));
            };

            const editCategory = (cat) => {
                setEditingCat(cat);
                setNewCatName(cat.name);
            };

            // Add Customer
            const handleAddCustomer = (e) => {
                e.preventDefault();
                if (!newCustomer.name) return;
                const id = customers.length > 0 ? Math.max(...customers.map(c => c.id)) + 1 : 1;
                setCustomers([...customers, { id, ...newCustomer }]);
                setNewCustomer({ name: '', phone: '', city: '' });
            };

            // Trucks Management
            const handleAddTruck = (e) => {
                e.preventDefault();
                if (!newTruck.type || !newTruck.plate) return;
                const id = trucks.length > 0 ? Math.max(...trucks.map(t => t.id)) + 1 : 1;
                setTrucks([...trucks, { id, ...newTruck }]);
                setNewTruck({ type: '', plate: '' });
            };

            const handleDeleteTruck = (id) => {
                if(window.confirm("Are you sure you want to delete this truck?")) {
                    setTrucks(trucks.filter(t => t.id !== id));
                }
            };

            // Invoice Form Handlers
            const openNewInvoiceForm = () => {
                setInvoiceDraft({
                    id: `INV-${1000 + invoices.length + 1}`,
                    date: new Date().toISOString().split('T')[0],
                    customerId: '', senderName: '', senderPhone: '', senderAddress: '',
                    receiverName: '', receiverPhone: '', receiverAddress: '',
                    truckId: '', amount: '', description: '', status: 'Pending'
                });
                setIsInvoiceFormOpen(true);
                setPreviewInvoice(null);
            };

            const handleEditInvoice = (inv) => {
                setInvoiceDraft(inv);
                setIsInvoiceFormOpen(true);
                setPreviewInvoice(null);
            };

            const handleCustomerSelect = (e) => {
                const val = e.target.value;
                if (val === 'new' || val === '') {
                    setInvoiceDraft({ ...invoiceDraft, customerId: val, senderName: '', senderPhone: '', senderAddress: '' });
                } else {
                    const customer = customers.find(c => c.id === Number(val));
                    if (customer) {
                        setInvoiceDraft({ 
                            ...invoiceDraft, 
                            customerId: val, 
                            senderName: customer.name, 
                            senderPhone: customer.phone, 
                            senderAddress: customer.city 
                        });
                    }
                }
            };

            const handleSaveInvoice = (e) => {
                e.preventDefault();
                
                let finalCustomerId = invoiceDraft.customerId;
                if (invoiceDraft.customerId === 'new' && invoiceDraft.senderName) {
                    const newCId = customers.length > 0 ? Math.max(...customers.map(c=>c.id)) + 1 : 1;
                    setCustomers([...customers, { id: newCId, name: invoiceDraft.senderName, phone: invoiceDraft.senderPhone, city: invoiceDraft.senderAddress }]);
                    finalCustomerId = newCId;
                }

                const finalInvoice = {
                    ...invoiceDraft,
                    customerId: finalCustomerId,
                    amount: Number(invoiceDraft.amount)
                };
                
                // Update if exists, else Add new
                const existingIndex = invoices.findIndex(i => i.id === finalInvoice.id);
                if (existingIndex >= 0) {
                    const updatedInvoices = [...invoices];
                    updatedInvoices[existingIndex] = finalInvoice;
                    setInvoices(updatedInvoices);
                } else {
                    setInvoices([finalInvoice, ...invoices]);
                }
                
                setIsInvoiceFormOpen(false);
            };

            const markInvoicePaid = (id) => {
                setInvoices(invoices.map(inv => inv.id === id ? { ...inv, status: 'Paid' } : inv));
            };

            const deleteInvoice = (id) => {
                if(window.confirm("Are you sure you want to delete this invoice?")) {
                    setInvoices(invoices.filter(inv => inv.id !== id));
                }
            };

            // Add Income
            const handleAddIncome = (e) => {
                e.preventDefault();
                if (!newIncome.amount || !newIncome.description || !newIncome.categoryId) return;
                const cat = incomeCategories.find(c => c.id === Number(newIncome.categoryId));
                const id = daybook.length > 0 ? Math.max(...daybook.map(d=>d.id)) + 1 : 1;
                const date = new Date().toISOString().split('T')[0];
                setDaybook([{ id, date, type: 'Income', categoryName: cat ? cat.name : 'Unknown', ...newIncome, amount: Number(newIncome.amount) }, ...daybook]);
                setNewIncome({ amount: '', description: '', categoryId: '' });
            };

            // Add Expense
            const handleAddExpense = (e) => {
                e.preventDefault();
                if (!newExpense.amount || !newExpense.description || !newExpense.categoryId) return;
                const cat = expenseCategories.find(c => c.id === Number(newExpense.categoryId));
                const id = daybook.length > 0 ? Math.max(...daybook.map(d=>d.id)) + 1 : 1;
                const date = new Date().toISOString().split('T')[0];
                setDaybook([{ id, date, type: 'Expense', categoryName: cat ? cat.name : 'Unknown', ...newExpense, amount: Number(newExpense.amount) }, ...daybook]);
                setNewExpense({ amount: '', description: '', categoryId: '' });
            };

            const deleteEntry = (id) => {
                if(window.confirm("Delete this entry?")) {
                    setDaybook(daybook.filter(d => d.id !== id));
                }
            };

            // Print function
            const printInvoice = () => {
                window.print();
            };

            // --- CALCULATIONS FOR DASHBOARD ---
            const manualIncome = daybook.filter(d => d.type === 'Income').reduce((sum, item) => sum + item.amount, 0);
            const invoiceIncome = invoices.reduce((sum, inv) => sum + inv.amount, 0);
            const totalIncome = manualIncome + invoiceIncome;
            
            const totalExpense = daybook.filter(d => d.type === 'Expense').reduce((sum, item) => sum + item.amount, 0);
            const totalBalance = totalIncome - totalExpense;
            const pendingInvoicesAmount = invoices.filter(i => i.status === 'Pending').reduce((sum, item) => sum + item.amount, 0);

            // Calculate Top Moving Trucks
            const topTrucks = trucks.map(truck => {
                const truckInvoices = invoices.filter(inv => Number(inv.truckId) === truck.id);
                const trips = truckInvoices.length;
                const revenue = truckInvoices.reduce((sum, inv) => sum + inv.amount, 0);
                return { ...truck, trips, revenue };
            }).filter(t => t.trips > 0).sort((a, b) => b.trips - a.trips).slice(0, 5);

            // Combine all recent transactions (Invoices + Income + Expenses)
            const allTransactions = [
                ...invoices.map(inv => ({ ...inv, transType: 'Invoice', sortDate: new Date(inv.date).getTime() })),
                ...daybook.map(entry => ({ ...entry, transType: entry.type, sortDate: new Date(entry.date).getTime() }))
            ].sort((a, b) => b.sortDate - a.sortDate).slice(0, 8); // Top 8 recent entries

            // --- CALCULATE DATA FOR ROUND CHARTS ---
            const incomeChartData = [];
            const invoiceTotalAmount = invoices.reduce((sum, inv) => sum + inv.amount, 0);
            if (invoiceTotalAmount > 0) {
                incomeChartData.push({ name: 'Sale / Invoices', amount: invoiceTotalAmount });
            }
            daybook.filter(d => d.type === 'Income').forEach(d => {
                let existing = incomeChartData.find(x => x.name === (d.categoryName || 'Other Income'));
                if (existing) existing.amount += d.amount;
                else incomeChartData.push({ name: d.categoryName || 'Other Income', amount: d.amount });
            });
            incomeChartData.sort((a, b) => b.amount - a.amount);

            const expenseChartData = [];
            daybook.filter(d => d.type === 'Expense').forEach(d => {
                let existing = expenseChartData.find(x => x.name === (d.categoryName || 'Other Expense'));
                if (existing) existing.amount += d.amount;
                else expenseChartData.push({ name: d.categoryName || 'Other Expense', amount: d.amount });
            });
            expenseChartData.sort((a, b) => b.amount - a.amount);

            // Chart Render Function
            const renderDonutChart = (data, title, type) => {
                const total = data.reduce((sum, item) => sum + item.amount, 0);
                const colors = type === 'income' 
                    ? ['#22c55e', '#3b82f6', '#14b8a6', '#8b5cf6', '#10b981', '#06b6d4'] 
                    : ['#ef4444', '#f97316', '#f59e0b', '#eab308', '#f43f5e', '#ec4899'];

                let currentPercentage = 0;
                const gradientStops = data.map((item, index) => {
                    const percentage = total > 0 ? (item.amount / total) * 100 : 0;
                    const start = currentPercentage;
                    const end = currentPercentage + percentage;
                    currentPercentage = end;
                    item.color = colors[index % colors.length];
                    return `${item.color} ${start}% ${end}%`;
                }).join(', ');

                return (
                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col items-center">
                        <h3 className="text-lg font-bold mb-4 w-full text-left border-b pb-2">{title}</h3>
                        {total > 0 ? (
                            <div className="flex flex-col sm:flex-row items-center w-full gap-8">
                                <div 
                                    className="w-48 h-48 rounded-full shadow-inner relative flex justify-center items-center shrink-0"
                                    style={{ background: `conic-gradient(${gradientStops})` }}
                                >
                                    <div className="w-24 h-24 bg-white rounded-full flex flex-col items-center justify-center shadow-sm">
                                        <span className="text-xs text-gray-500 text-center leading-tight">Total<br/>{type === 'income' ? 'Income' : 'Expense'}</span>
                                    </div>
                                </div>
                                <div className="w-full flex flex-col gap-2 max-h-48 overflow-y-auto pr-2">
                                    {data.map((item, idx) => (
                                        <div key={idx} className="flex justify-between items-center text-sm border-b border-gray-50 pb-2 last:border-0">
                                            <div className="flex items-center gap-2">
                                                <span className="w-3 h-3 rounded-full shrink-0" style={{ backgroundColor: item.color }}></span>
                                                <span className="text-gray-700 font-medium truncate max-w-[140px]" title={item.name}>{item.name}</span>
                                            </div>
                                            <span className="font-bold text-gray-800">AED {item.amount.toLocaleString()}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="h-48 flex items-center justify-center text-gray-400 w-full bg-slate-50 rounded-lg border border-dashed border-gray-200">
                                No {type} data available
                            </div>
                        )}
                    </div>
                );
            };

            // Filter Invoices based on search query
            const filteredInvoices = invoices.filter(inv => {
                if (!invoiceSearchQuery) return true;
                const searchLower = invoiceSearchQuery.toLowerCase();
                const truck = trucks.find(t => t.id === Number(inv.truckId));
                const truckDetails = truck ? `${truck.type} ${truck.plate}`.toLowerCase() : '';
                
                return (
                    inv.id.toLowerCase().includes(searchLower) ||
                    inv.date.toLowerCase().includes(searchLower) ||
                    inv.senderName.toLowerCase().includes(searchLower) ||
                    (inv.receiverName && inv.receiverName.toLowerCase().includes(searchLower)) ||
                    truckDetails.includes(searchLower)
                );
            });

            // --- DATE FILTER LOGIC FOR REPORTS ---
            const isDateInRange = (dateStr) => {
                if (reportDateFilter === 'all') return true;
                const d = new Date(dateStr);
                const today = new Date();
                const todayStr = today.toISOString().split('T')[0];

                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const yesterdayStr = yesterday.toISOString().split('T')[0];

                const dYear = d.getFullYear();
                const dMonth = d.getMonth();
                const tYear = today.getFullYear();
                const tMonth = today.getMonth();

                if (reportDateFilter === 'today') return dateStr === todayStr;
                if (reportDateFilter === 'yesterday') return dateStr === yesterdayStr;
                if (reportDateFilter === 'this_month') return dYear === tYear && dMonth === tMonth;
                if (reportDateFilter === 'last_month') {
                    const prevMonth = tMonth === 0 ? 11 : tMonth - 1;
                    const prevYear = tMonth === 0 ? tYear - 1 : tYear;
                    return dYear === prevYear && dMonth === prevMonth;
                }
                if (reportDateFilter === 'this_year') return dYear === tYear;
                if (reportDateFilter === 'custom') {
                    if (!customStartDate && !customEndDate) return true;
                    if (customStartDate && dateStr < customStartDate) return false;
                    if (customEndDate && dateStr > customEndDate) return false;
                    return true;
                }
                return true;
            };

            const reportInvoices = invoices.filter(inv => isDateInRange(inv.date));
            const reportDaybook = daybook.filter(d => isDateInRange(d.date));

            // --- CALCULATIONS FOR REPORTS ---
            const reportManualIncome = reportDaybook.filter(d => d.type === 'Income').reduce((sum, item) => sum + item.amount, 0);
            const reportInvoiceIncome = reportInvoices.reduce((sum, inv) => sum + inv.amount, 0);

            const reportTotalExpense = reportDaybook.filter(d => d.type === 'Expense').reduce((sum, item) => sum + item.amount, 0);
            const reportTotalBalance = reportTotalIncome - reportTotalExpense;

                ...reportInvoices.map(inv => ({ id: `inv-${inv.id}`, date: inv.date, description: `Invoice #${inv.id} - ${inv.senderName}`, categoryName: 'Sale Invoice', type: 'Income', amount: inv.amount })),

                                        Secure System Environment

                                            {loginError}

                                            </div>

                                                type="password"

                                                placeholder="Enter your password"
                                            />
                                        </div>

                        </div>

            return (

                            <IconTruck size={32} className="text-blue-400 shrink-0" />
                            <div className="leading-tight">
                                <h1 className="font-bold text-lg">AMER BASHIR</h1>
                                <h1 className="font-bold text-sm text-slate-300 mb-1">TRANSPORT LLC</h1>
                                <p className="text-sm text-blue-400 font-bold tracking-wide">عامر بشير للنقليات ذ.م.م</p>

                                        </div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex items-center space-x-4 relative overflow-hidden">
                                            <div className="absolute -right-4 -top-4 w-24 h-24 bg-green-50 rounded-full opacity-50 pointer-events-none"></div>
                                            <div className="p-3 bg-gradient-to-br from-green-100 to-green-200 text-green-600 rounded-xl relative z-10"><IconTrendingUp size={24} /></div>
                                            <div className="relative z-10"><p className="text-sm text-gray-500 font-medium">Total Income</p><h3 className="text-2xl font-bold text-green-600">AED {totalIncome.toLocaleString()}</h3></div>
                                        </div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex items-center space-x-4 relative overflow-hidden">
                                            <div className="absolute -right-4 -top-4 w-24 h-24 bg-red-50 rounded-full opacity-50 pointer-events-none"></div>
                                            <div className="p-3 bg-gradient-to-br from-red-100 to-red-200 text-red-600 rounded-xl relative z-10"><IconTrendingDown size={24} /></div>
                                            <div className="relative z-10"><p className="text-sm text-gray-500 font-medium">Total Expense</p><h3 className="text-2xl font-bold text-red-600">AED {totalExpense.toLocaleString()}</h3></div>
                                        </div>
                                        <div className="bg-white p-6 rounded-2xl shadow-sm hover:shadow-md transition-shadow border border-gray-100 flex items-center space-x-4 relative overflow-hidden">
                                            <div className="absolute -right-4 -top-4 w-24 h-24 bg-indigo-50 rounded-full opacity-50 pointer-events-none"></div>
                                            <div className="p-3 bg-gradient-to-br from-indigo-100 to-indigo-200 text-indigo-600 rounded-xl relative z-10"><IconDollarSign size={24} /></div>
                                            <div className="relative z-10"><p className="text-sm text-gray-500 font-medium">Balance</p><h3 className={`text-2xl font-bold ${totalBalance >= 0 ? 'text-indigo-600' : 'text-red-600'}`}>AED {totalBalance.toLocaleString()}</h3></div>
                                        </div>
                                    </div>

                                    {/* Charts Section */}
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 print:hidden">
                                        {renderDonutChart(incomeChartData, 'Income Breakdown', 'income')}
                                        {renderDonutChart(expenseChartData, 'Expense Breakdown', 'expense')}
                                    </div>

                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 mt-6">
                                        {/* All Recent Transactions */}
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 lg:col-span-2">
                                            <h3 className="text-lg font-bold mb-4 border-b pb-2">Recent Transactions</h3>
                                            <div className="overflow-x-auto">
                                                <table className="w-full text-left">
                                                    <thead>
                                                        <tr className="text-gray-500 text-sm border-b">
                                                            <th className="pb-2">Date</th>
                                                            <th className="pb-2">Type</th>
                                                            <th className="pb-2">Description / Details</th>
                                                            <th className="pb-2 text-right">Amount</th>
                                                        </tr>
                                                    </thead>
                                                    <tbody>
                                                        {allTransactions.map((tx, idx) => (
                                                            <tr key={idx} className="border-b last:border-0 hover:bg-gray-50 transition-colors">
                                                                <td className="py-3 text-sm text-gray-600">{tx.date}</td>
                                                                <td className="py-3">
                                                                    <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                                        tx.transType === 'Invoice' ? 'bg-blue-100 text-blue-700' :
                                                                        tx.transType === 'Income' ? 'bg-green-100 text-green-700' :
                                                                        'bg-red-100 text-red-700'
                                                                    }`}>
                                                                        {tx.transType}
                                                                    </span>
                                                                </td>
                                                                <td className="py-3 text-sm font-medium text-slate-800">
                                                                    {tx.transType === 'Invoice' ? `Invoice #${tx.id} - To: ${tx.receiverName || 'Unknown'}` : tx.description}
                                                                </td>
                                                                <td className={`py-3 text-right font-semibold ${
                                                                        tx.transType === 'Expense' ? 'text-red-600' :
                                                                        tx.transType === 'Income' ? 'text-green-600' :
                                                                        'text-slate-800'
                                                                    }`}>
                                                                    {tx.transType === 'Expense' ? '-' : '+'} AED {tx.amount.toLocaleString()}
                                                                </td>
                                                            </tr>
                                                        ))}
                                                        {allTransactions.length === 0 && <tr><td colSpan="4" className="py-4 text-center text-gray-500">No recent transactions found.</td></tr>}
                                                    </tbody>
                                                </table>
                                            </div>
                                        </div>

                                        {/* Top Moving Trucks */}
                                        <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                                            <h3 className="text-lg font-bold mb-4 border-b pb-2 flex items-center">
                                                <IconTruck size={18} className="mr-2 text-blue-600"/> Top Moving Trucks
                                            </h3>
                                            <div className="space-y-3">
                                                {topTrucks.map((truck, idx) => (
                                                    <div key={truck.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-lg border border-slate-100">
                                                        <div className="flex items-center space-x-3">
                                                            <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-700 flex items-center justify-center font-bold text-sm">
                                                                {idx + 1}
                                                            </div>
                                                            <div>
                                                                <p className="font-bold text-sm text-slate-800">{truck.plate}</p>
                                                                <p className="text-xs text-slate-500">{truck.type}</p>
                                                            </div>
                                                        </div>
                                                        <div className="text-right">
                                                            <p className="font-bold text-sm text-slate-800">{truck.trips} Trips</p>
                                                            <p className="text-xs text-green-600 font-semibold">AED {truck.revenue.toLocaleString()}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                                {topTrucks.length === 0 && <p className="text-sm text-gray-500 text-center py-4">No truck data available yet.</p>}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* CUSTOMERS TAB */}
                            {activeTab === 'customers' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                        <h3 className="text-lg font-bold mb-4 flex items-center"><IconPlus size={18} className="mr-2"/> Add New Customer</h3>
                                        <form onSubmit={handleAddCustomer} className="flex flex-wrap gap-4 items-end">
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm text-gray-600 mb-1">Company / Name</label>
                                                <input type="text" required value={newCustomer.name} onChange={e => setNewCustomer({...newCustomer, name: e.target.value})} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Enter name..." />
                                            </div>
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm text-gray-600 mb-1">Phone Number</label>
                                                <input type="text" value={newCustomer.phone} onChange={e => setNewCustomer({...newCustomer, phone: e.target.value})} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="05X-XXXXXXX" />
                                            </div>
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm text-gray-600 mb-1">Address</label>
                                                <input type="text" value={newCustomer.city} onChange={e => setNewCustomer({...newCustomer, city: e.target.value})} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Address..." />
                                            </div>
                                            <div className="w-full md:w-auto flex items-end">
                                                <button type="submit" className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-2.5 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5 transition-all font-semibold w-auto">
                                                    Add Customer
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                                        <h3 className="text-lg font-bold mb-4">Customer Database</h3>
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-left border-collapse">
                                                <thead>
                                                    <tr className="bg-gray-50 text-gray-600">
                                                        <th className="p-3 rounded-tl-lg">ID</th>
                                                        <th className="p-3">Name</th>
                                                        <th className="p-3">Phone</th>
                                                        <th className="p-3">Address</th>
                                                        <th className="p-3 text-center rounded-tr-lg">Actions</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {customers.map(c => (
                                                        <tr key={c.id} className="border-b hover:bg-gray-50 transition-colors">
                                                            <td className="p-3">#{c.id}</td>
                                                            <td className="p-3 font-medium text-blue-600 cursor-pointer hover:underline" onClick={() => setViewingCustomerLedger(c)} title="View Ledger">
                                                                {c.name}
                                                            </td>
                                                            <td className="p-3">{c.phone}</td>
                                                            <td className="p-3">{c.city}</td>
                                                            <td className="p-3 text-center">
                                                                <button onClick={() => setViewingCustomerLedger(c)} className="p-2 text-indigo-500 hover:bg-indigo-100 rounded-lg transition" title="View Ledger">
                                                                    <IconBookOpen size={18} />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                    {customers.length === 0 && <tr><td colSpan="5" className="p-4 text-center text-gray-500">No customers saved.</td></tr>}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* TRUCKS TAB */}
                            {activeTab === 'trucks' && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                        <h3 className="text-lg font-bold mb-4 flex items-center"><IconPlus size={18} className="mr-2"/> Add New Truck</h3>
                                        <form onSubmit={handleAddTruck} className="flex flex-wrap gap-4 items-end">
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm text-gray-600 mb-1">Truck Type (e.g. 10 Ton, 40 Feet)</label>
                                                <input type="text" required value={newTruck.type} onChange={e => setNewTruck({...newTruck, type: e.target.value})} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Truck type..." />
                                            </div>
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-sm text-gray-600 mb-1">Plate Number</label>
                                                <input type="text" required value={newTruck.plate} onChange={e => setNewTruck({...newTruck, plate: e.target.value})} className="w-full border rounded-lg p-2 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="e.g. DXB-12345" />
                                            </div>
                                            <div className="w-full md:w-auto flex items-end">
                                                <button type="submit" className="bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-8 py-2.5 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5 transition-all font-semibold w-auto">
                                                    Add Truck
                                                </button>
                                            </div>
                                        </form>
                                    </div>

                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6">
                                        <h3 className="text-lg font-bold mb-4">Trucks Database</h3>
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-50 text-gray-600">
                                                    <th className="p-3 rounded-tl-lg">ID</th>
                                                    <th className="p-3">Type</th>
                                                    <th className="p-3">Plate Number</th>
                                                    <th className="p-3 rounded-tr-lg text-right">Action</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {trucks.map(t => (
                                                    <tr key={t.id} className="border-b hover:bg-gray-50">
                                                        <td className="p-3">#{t.id}</td>
                                                        <td className="p-3 font-medium">{t.type}</td>
                                                        <td className="p-3">{t.plate}</td>
                                                        <td className="p-3 text-right">
                                                            <button onClick={() => handleDeleteTruck(t.id)} className="text-red-500 hover:text-red-700 p-2" title="Delete Truck">
                                                                <IconTrash2 size={18} />
                                                            </button>
                                                        </td>
                                                    </tr>
                                                ))}
                                                {trucks.length === 0 && (
                                                    <tr><td colSpan="4" className="p-4 text-center text-gray-500">No trucks added yet.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}

                            {/* INVOICES TAB */}
                            {activeTab === 'invoices' && (
                                <div className="space-y-6">
                                    
                                    {/* --- INVOICES LIST VIEW --- */}
                                    {!isInvoiceFormOpen && (
                                        <div className={previewInvoice ? "print:hidden" : ""}>
                                            <div className="flex justify-between items-center print:hidden mb-6">
                                                <h3 className="text-xl font-bold text-gray-800">Invoices List</h3>
                                                <div className="flex space-x-3">
                                                    <div className="relative">
                                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                                            <IconSearch size={16} className="text-gray-400" />
                                                        </div>
                                                        <input 
                                                            type="text" 
                                                            placeholder="Search invoices..." 
                                                            value={invoiceSearchQuery}
                                                            onChange={(e) => setInvoiceSearchQuery(e.target.value)}
                                                            className="pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none w-64"
                                                        />
                                                    </div>
                                                    <button onClick={openNewInvoiceForm} className="bg-gradient-to-r from-blue-600 to-indigo-500 text-white px-4 py-2 rounded-xl hover:shadow-lg hover:shadow-blue-500/30 transform hover:-translate-y-0.5 transition-all font-medium flex items-center">
                                                        <IconPlus size={18} className="mr-2"/> Create New Invoice
                                                    </button>
                                                </div>
                                            </div>
                                            
                                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 p-6 print:hidden">
                                                <div className="overflow-x-auto">
                                                    <table className="w-full text-left border-collapse">
                                                        <thead>
                                                            <tr className="bg-gray-50 text-gray-600 text-sm border-b">
                                                                <th className="p-3 rounded-tl-lg">Date / ID</th>
                                                                <th className="p-3">From (Sender)</th>
                                                                <th className="p-3">To (Receiver)</th>
                                                                <th className="p-3">Truck Details</th>
                                                                <th className="p-3 text-right">Amount</th>
                                                                <th className="p-3 text-center rounded-tr-lg">Actions</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {filteredInvoices.map(inv => (
                                                                <tr key={inv.id} className="border-b hover:bg-gray-50 transition-colors">
                                                                    <td className="p-3">
                                                                        <div className="font-medium text-blue-600">{inv.id}</div>
                                                                        <div className="text-sm text-gray-500">{inv.date}</div>
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <div className="font-medium text-slate-800">{inv.senderName}</div>
                                                                        <div className="text-xs text-gray-500">{inv.senderAddress}</div>
                                                                    </td>
                                                                    <td className="p-3">
                                                                        <div className="font-medium text-slate-800">{inv.receiverName}</div>
                                                                        <div className="text-xs text-gray-500">{inv.receiverAddress}</div>
                                                                    </td>
                                                                    <td className="p-3 text-sm text-slate-700">
                                                                        {trucks.find(t => t.id === Number(inv.truckId)) ? 
                                                                            `${trucks.find(t => t.id === Number(inv.truckId)).type} (${trucks.find(t => t.id === Number(inv.truckId)).plate})` 
                                                                            : 'N/A'
                                                                        }
                                                                    </td>
                                                                    <td className="p-3 text-right">
                                                                        <div className="font-semibold text-slate-800">AED {inv.amount.toLocaleString()}</div>
                                                                        <div className={`text-xs mt-1 font-medium ${inv.status === 'Paid' ? 'text-green-600' : 'text-yellow-600'}`}>
                                                                            {inv.status}
                                                                        </div>
                                                                    </td>
                                                                    <td className="p-3 text-center">
                                                                        <div className="flex justify-center space-x-2">
                                                                            <button onClick={() => setPreviewInvoice(inv)} className="p-2 text-blue-500 hover:bg-blue-100 rounded-lg transition" title="Preview Invoice">
                                                                                <IconEye size={18} />
                                                                            </button>
                                                                            <button onClick={() => handleEditInvoice(inv)} className="p-2 text-green-500 hover:bg-green-100 rounded-lg transition" title="Edit Invoice">
                                                                                <IconEdit size={18} />
                                                                            </button>
                                                                            <button onClick={() => deleteInvoice(inv.id)} className="p-2 text-red-500 hover:bg-red-100 rounded-lg transition" title="Delete Invoice">
                                                                                <IconTrash2 size={18} />
                                                                            </button>
                                                                        </div>
                                                                    </td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                    {filteredInvoices.length === 0 && (
                                                        <p className="text-center text-gray-500 p-6">
                                                            {invoiceSearchQuery ? `No invoices found matching "${invoiceSearchQuery}"` : "No invoices found."}
                                                        </p>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    )}

                                    {/* --- CREATE / EDIT INVOICE FORM --- */}
                                    {isInvoiceFormOpen && (
                                        <div className="bg-white p-6 rounded-xl shadow-lg border border-gray-200 print:hidden relative">
                                            <button onClick={() => setIsInvoiceFormOpen(false)} className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition">
                                                <IconX size={24} />
                                            </button>
                                            <h3 className="text-xl font-bold mb-6 border-b pb-4">Create New Invoice</h3>
                                            
                                            <form onSubmit={handleSaveInvoice} className="space-y-6">
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 bg-slate-50 p-4 rounded-lg">
                                                    <div>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Invoice Number</label>
                                                        <input type="text" required value={invoiceDraft.id} onChange={e => setInvoiceDraft({...invoiceDraft, id: e.target.value})} className="w-full border rounded-lg p-2 bg-white outline-none focus:ring-2 focus:ring-blue-500" />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-semibold text-gray-700 mb-1">Date</label>
                                                        <input type="date" required value={invoiceDraft.date} onChange={e => setInvoiceDraft({...invoiceDraft, date: e.target.value})} className="w-full border rounded-lg p-2 bg-white outline-none focus:ring-2 focus:ring-blue-500" />
                                                    </div>
                                                </div>

                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                                    <div className="space-y-4">
                                                        <h4 className="font-bold text-lg text-blue-800 border-b pb-2">From (Sender Details)</h4>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Select Customer</label>
                                                            <select value={invoiceDraft.customerId} onChange={handleCustomerSelect} className="w-full border rounded-lg p-2 bg-white outline-none focus:ring-2 focus:ring-blue-500">
                                                                <option value="">Select Existing Customer...</option>
                                                                {customers.map(c => <option key={c.id} value={c.id}>{c.name} ({c.city})</option>)}
                                                                <option value="new" className="font-bold text-blue-600 bg-blue-50">+ Create New Customer</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Sender Name</label>
                                                            <input type="text" required value={invoiceDraft.senderName} onChange={e => setInvoiceDraft({...invoiceDraft, senderName: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Sender Name" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Sender Phone</label>
                                                            <input type="text" value={invoiceDraft.senderPhone} onChange={e => setInvoiceDraft({...invoiceDraft, senderPhone: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Phone Number" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Sender Address</label>
                                                            <input type="text" value={invoiceDraft.senderAddress} onChange={e => setInvoiceDraft({...invoiceDraft, senderAddress: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-blue-500" placeholder="Address" />
                                                        </div>
                                                    </div>

                                                    <div className="space-y-4">
                                                        <h4 className="font-bold text-lg text-green-800 border-b pb-2">To (Receiver Details)</h4>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Receiver Name</label>
                                                            <input type="text" required value={invoiceDraft.receiverName} onChange={e => setInvoiceDraft({...invoiceDraft, receiverName: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-green-500" placeholder="Receiver Name" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Receiver Phone</label>
                                                            <input type="text" value={invoiceDraft.receiverPhone} onChange={e => setInvoiceDraft({...invoiceDraft, receiverPhone: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-green-500" placeholder="Phone Number" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Receiver Address (Destination)</label>
                                                            <textarea rows="3" required value={invoiceDraft.receiverAddress} onChange={e => setInvoiceDraft({...invoiceDraft, receiverAddress: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-green-500" placeholder="Delivery Address"></textarea>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-slate-50 p-4 rounded-lg space-y-4 mt-6">
                                                    <h4 className="font-bold text-lg text-slate-800 border-b pb-2">Transport & Goods Details</h4>
                                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                        <div className="md:col-span-2">
                                                            <label className="block text-sm text-gray-600 mb-1">Goods Description</label>
                                                            <input type="text" required value={invoiceDraft.description} onChange={e => setInvoiceDraft({...invoiceDraft, description: e.target.value})} className="w-full border rounded-lg p-2 outline-none focus:ring-2 focus:ring-slate-500" placeholder="What is being transported?" />
                                                        </div>
                                                        <div>
                                                            <label className="block text-sm text-gray-600 mb-1">Select Truck Type</label>
                                                            <select required value={invoiceDraft.truckId} onChange={e => setInvoiceDraft({...invoiceDraft, truckId: e.target.value})} className="w-full border rounded-lg p-2 bg-white outline-none focus:ring-2 focus:ring-slate-500">
                                                                <option value="">Select Truck...</option>
                                                                {trucks.map(t => <option key={t.id} value={t.id}>{t.type} ({t.plate})</option>)}
                                                            </select>
                                                        </div>
                                                        <div className="md:col-span-2"></div>
